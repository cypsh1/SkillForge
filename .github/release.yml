changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "New Features"
      labels:
        - feature
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
        - docs
    - title: "Maintenance"
      labels:
        - chore
        - dependencies
        - ci
    - title: "Other Changes"
      labels:
        - "*"
